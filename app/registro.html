                            <div class="col-md-6">
                                <div class="card shadow-sm h-100">
                                    <div class="card-body p-4">
                                        <h3 class="card-title text-center mb-3 fs-4">Iniciar Sesión</h3>
                                        <form>
                                            <div class="mb-2">
                                                <label for="loginEmail" class="form-label small">Correo
                                                    Electrónico</label>
                                                <input type="email" class="form-control form-control-sm" id="loginEmail"
                                                    placeholder="nombre@ejemplo.com">
                                            </div>
                                            <div class="mb-2">
                                                <label for="loginPassword" class="form-label small">Contraseña</label>
                                                <input type="password" class="form-control form-control-sm"
                                                    id="loginPassword" placeholder="*********">
                                            </div>
                                            <div class="mb-3 form-check">
                                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                                <label class="form-check-label small"
                                                    for="rememberMe">Recordarme</label>
                                            </div>
                                            <button type="submit" class="btn btn-sm w-100"
                                                style="background: linear-gradient(to right, #0d043b, #3b355e); color: #fffdfd;">
                                                Ingresar
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card shadow-sm h-100">
                                    <div class="card-body p-4">
                                        <h3 class="card-title text-center mb-3 fs-4">Crear Cuenta</h3>
                                        <form>
                                            <div class="mb-2">
                                                <label for="regName" class="form-label small">Nombre Completo</label>
                                                <input type="text" class="form-control form-control-sm" id="regName"
                                                    placeholder="Tu Nombre">
                                            </div>
                                            <div class="mb-2">
                                                <label for="regBirth" class="form-label small">Fecha de
                                                    Nacimiento</label>
                                                <input type="date" class="form-control form-control-sm" id="regBirth">
                                            </div>
                                            <div class="mb-2">
                                                <label for="regEmail" class="form-label small">Correo
                                                    Electrónico</label>
                                                <input type="email" class="form-control form-control-sm" id="regEmail"
                                                    placeholder="nombre@ejemplo.com">
                                            </div>
                                            <div class="mb-3">
                                                <label for="regPassword" class="form-label small">Contraseña</label>
                                                <input type="password" class="form-control form-control-sm"
                                                    id="regPassword" placeholder="*********">
                                            </div>
                                            <button type="submit" class="btn btn-sm w-100"
                                                style="background: linear-gradient(to right, #0d043b, #3b355e); color: #fffdfd;">
                                                Ingresar
                                            </button>
                                        </form>
